name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The led package's rpi_ws281x cgo binding gates its hardware implementation behind
      # `//go:build arm || arm64` (see ws2811_hw.go) and falls back to a pure-Go simulator
      # stub on other architectures, so this amd64 job doesn't need the C library at all -
      # only the linux/arm/v6 Docker build below does, and the Dockerfile handles that.
      # libasound2-dev is still needed natively: the audio package's oto dependency links
      # against ALSA on Linux regardless of architecture.
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libasound2-dev

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet -tags no_d2xx ./...

      - name: go build
        run: go build -tags no_d2xx ./...

      - name: go test
        run: go test -tags no_d2xx ./...

      # There's an existing backlog of lint findings in this codebase (mostly errcheck on
      # deferred Close() calls and a few staticcheck style issues) that predates this
      # workflow. only-new-issues scopes failures to lines touched by the current
      # push/PR so CI can go green today; the backlog gets cleaned up incrementally.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: --build-tags=no_d2xx
          only-new-issues: true

  docker-build:
    name: Docker image (linux/arm/v6)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v6
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
