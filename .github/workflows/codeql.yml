name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '25 0 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'go' ]
        # CodeQL supports [ 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby' ]
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    # Autobuild can't handle this module: the led package wraps the rpi_ws281x C library
    # via cgo and requires it pre-installed at /usr/local/lib|include before `go build`
    # will even type-check, so we build it manually here (same as the CI workflow and the
    # Dockerfile's lib_builder stage) instead of relying on autobuild.
    - name: Install native build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y \
          build-essential \
          cmake \
          libasound2-dev

    - name: Build and install rpi_ws281x C library
      run: |
        git clone --depth 1 https://github.com/jgarff/rpi_ws281x.git /tmp/rpi_ws281x
        cmake -S /tmp/rpi_ws281x -B /tmp/rpi_ws281x/build -D BUILD_SHARED=OFF -D BUILD_TEST=OFF
        cmake --build /tmp/rpi_ws281x/build
        sudo cmake --install /tmp/rpi_ws281x/build

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # If you wish to specify custom queries, you can do so here or in a config file.
        # By default, queries listed here will override any specified in a config file.
        # Prefix the list here with "+" to use these queries and those in the config file.

        # Details on CodeQL's query packs refer to : https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        # queries: security-extended,security-and-quality

    - name: Build
      run: go build -tags no_d2xx ./...

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
